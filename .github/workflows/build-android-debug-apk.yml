name: Android Validation

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master

permissions:
  contents: read

jobs:
  baseline-build:
    name: Baseline Gradle validation (no signing secrets)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - uses: gradle/actions/setup-gradle@v4
      - name: Run unit tests and debug build
        run: ./gradlew testDebugUnitTest assembleDebug

  signed-debug-apk:
    name: Signed debug APK (reusable workflow validates secrets)
    # Do not add a job-level `if:` that reads `secrets.*` here.
    # GitHub evaluates reusable-workflow jobs before those secrets can be
    # used in `jobs.<job_id>.if`, which causes the workflow to fail at 0s.
    uses: Josh-Temple/Ingrain/.github/workflows/reusable-android-debug-apk.yml@v1
    with:
      app_module: app
      gradle_task: assembleDebug
      java_version: "17"
      artifact_name: habhub_android-debug-apk
      artifact_name_ephemeral: habhub_android-debug-apk-fresh-install-only
      apk_glob: "**/build/outputs/apk/debug/*.apk"
      allow_ephemeral_signing: false
      version_name_prefix: "1.0"
    secrets:
      DEBUG_KEYSTORE_BASE64: ${{ secrets.DEBUG_KEYSTORE_BASE64 }}
      DEBUG_KEYSTORE_PASSWORD: ${{ secrets.DEBUG_KEYSTORE_PASSWORD }}
      DEBUG_KEY_ALIAS: ${{ secrets.DEBUG_KEY_ALIAS }}
      DEBUG_KEY_PASSWORD: ${{ secrets.DEBUG_KEY_PASSWORD }}
